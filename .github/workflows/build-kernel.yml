name: Build Kernel with SukiSU Ultra (4.19)
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    name: Build Kernel with SukiSU Ultra
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - name: Check out
      uses: actions/checkout@v4

    - name: Read configuration
      run: |
        CONFIG_ENV=config.properties
        echo "KERNEL_SOURCE=$(grep -w "KERNEL_SOURCE" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(grep -w "KERNEL_SOURCE_BRANCH" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_CONFIG=$(grep -w "KERNEL_CONFIG" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_IMAGE_NAME=$(grep -w "KERNEL_IMAGE_NAME" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ARCH=$(grep -w "ARCH" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM64=$(grep -w "ENABLE_GCC_ARM64" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM32=$(grep -w "ENABLE_GCC_ARM32" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_KERNELSU=$(grep -w "ENABLE_KERNELSU" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNELSU_SOURCE=$(grep -w "KERNELSU_SOURCE" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNELSU_BRANCH=$(grep -w "KERNELSU_BRANCH" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE_LTO=$(grep -w "DISABLE_LTO" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE_CC_WERROR=$(grep -w "DISABLE_CC_WERROR" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ADD_KPROBES_CONFIG=$(grep -w "ADD_KPROBES_CONFIG" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_CCACHE=$(grep -w "ENABLE_CCACHE" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "REMOVE_UNUSED_PACKAGES=$(grep -w "REMOVE_UNUSED_PACKAGES" $CONFIG_ENV | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV

    - name: Remove unused packages
      if: env.REMOVE_UNUSED_PACKAGES == 'true'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false

    - name: Set Swap to 10GB
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt update
        sudo apt install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel

    - name: Setup SukiSU Ultra
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        git clone --depth=1 ${{ env.KERNELSU_SOURCE }} -b ${{ env.KERNELSU_BRANCH }} KernelSU
        echo "UPLOADNAME=-SukiSU" >> $GITHUB_ENV

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # 关闭 LTO (4.19必须)
        if [ "${{ env.DISABLE_LTO }}" = "true" ]; then
          sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/g' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }} || true
          echo "CONFIG_LTO_NONE=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        # 关闭 CC_WERROR (4.19必须)
        if [ "${{ env.DISABLE_CC_WERROR }}" = "true" ]; then
          echo "CONFIG_CC_WERROR=n" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        # SUSFS 最强隐藏
        echo "CONFIG_KSU=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_HIDE_MOUNTS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 非 GKI 必须
        echo "CONFIG_KALLSYMS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KALLSYMS_ALL=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 关闭调试
        echo "CONFIG_DEBUG_INFO=n" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 强制生成 Image.gz
        echo "CONFIG_KERNEL_GZIP=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 跳过 scripts 检测，直接生成配置
        yes "" | make ARCH=${{ env.ARCH }} oldconfig

    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        # 只编译最低限度的 scripts
        make ARCH=${{ env.ARCH }} scripts_basic CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        if [ "${{ env.ENABLE_CCACHE }}" = "true" ]; then
          make -j$(nproc --all) ARCH=${{ env.ARCH }} CC="ccache gcc" Image.gz CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        else
          make -j$(nproc --all) ARCH=${{ env.ARCH }} CC=gcc Image.gz CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        fi

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ -f android-kernel/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
        elif [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
        else
          echo "Kernel output file not found!"
          find android-kernel -name "*Image*" -type f 2>/dev/null
          exit 1
        fi

    - name: Package AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        IMAGE_PATH=$(find android-kernel -name "${{ env.KERNEL_IMAGE_NAME }}" -type f 2>/dev/null | head -1)
        if [ -z "$IMAGE_PATH" ]; then
          IMAGE_PATH=$(find android-kernel -name "Image" -type f 2>/dev/null | head -1)
        fi
        if [ -z "$IMAGE_PATH" ]; then
          echo "Image not found!"
          exit 1
        fi
        cp "$IMAGE_PATH" AnyKernel3/
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cd AnyKernel3 && zip -r ../AnyKernel3-SukiSU-Ultra.zip *

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-SukiSU-Ultra-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3-SukiSU-Ultra.zip      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel

    - name: Setup SukiSU Ultra
