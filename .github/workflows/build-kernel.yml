        echo "CONFIG_KSU=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_HIDE_MOUNTS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 非 GKI 必须
        echo "CONFIG_KALLSYMS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KALLSYMS_ALL=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 关闭调试
        echo "CONFIG_DEBUG_INFO=n" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 强制生成 Image.gz
        echo "CONFIG_KERNEL_GZIP=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 重新生成配置
        make ARCH=${{ env.ARCH }} olddefconfig

    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        make ARCH=${{ env.ARCH }} ${{ env.KERNEL_CONFIG }}
        if [ "${{ env.ENABLE_CCACHE }}" = "true" ]; then
          make -j$(nproc --all) ARCH=${{ env.ARCH }} CC="ccache gcc" Image.gz CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        else
          make -j$(nproc --all) ARCH=${{ env.ARCH }} CC=gcc Image.gz CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        fi

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ -f android-kernel/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
        elif [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
        else
          echo "Kernel output file not found!"
          find android-kernel -name "*Image*" -type f 2>/dev/null
          exit 1
        fi

    - name: Package AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        IMAGE_PATH=$(find android-kernel -name "${{ env.KERNEL_IMAGE_NAME }}" -type f 2>/dev/null | head -1)
        if [ -z "$IMAGE_PATH" ]; then
          IMAGE_PATH=$(find android-kernel -name "Image" -type f 2>/dev/null | head -1)
        fi
        if [ -z "$IMAGE_PATH" ]; then
          echo "Image not found!"
          exit 1
        fi
        cp "$IMAGE_PATH" AnyKernel3/
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
